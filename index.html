<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Reaction Test</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3036128934622320" crossorigin="anonymous"></script>
    <link rel="icon" type="image/png" sizes="1280x1280" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #f5f5f0; 
            --card-bg: #ffffff;
            --text: #2c2c2e;
            --accent: #d4a373;
            --border: #e0e0d5;
            --success: #2a9d8f;
            --error: #e63946;
        }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Georgia', serif;
            display: flex; flex-direction: column;
            user-select: none;
        }

        /* HEADER & LOGO STYLING FÜR ZENTRIERUNG */
        .header {
            display: flex;
            flex-direction: column; /* Stapelt Logo über Titel */
            align-items: center;    /* Zentriert beide horizontal */
            width: 100%;
            margin-bottom: 40px;    /* Abstand zum Spiel-Container */
        }

        .header img {
            height: 60px;
            margin-bottom: 20px;    /* Abstand zwischen Logo und Titel */
            cursor: pointer;
        }

        .header h1 { 
            font-size: 3.5rem; 
            font-weight: 400; 
            margin: 0;              /* Margins entfernt, da Header steuert */
            letter-spacing: -1px; 
            text-align: center; 
        }

        .main-content {
            width: 100%; max-width: 700px;
            margin: 0 auto;
            padding: 60px 20px 0 20px;
            display: flex; flex-direction: column; align-items: center;
            flex-grow: 1;
        }

        #game-zone {
            width: 100%;
            height: 280px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.1s;
            text-align: center;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border-radius: 2px;
        }

        .instruction-text {
            font-family: sans-serif;
            font-size: 20px;
            font-weight: bold;
            pointer-events: none;
        }

        .result-display {
            margin-top: 20px;
            font-family: sans-serif;
            text-align: center;
            min-height: 100px;
        }

        .time-value { font-size: 42px; font-weight: 900; color: var(--accent); }
        .rank-text { font-size: 18px; opacity: 0.6; margin-top: 5px; }

        .footer-fixed {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--bg); padding: 10px 0 15px 0;
            display: flex; flex-direction: column; align-items: center; z-index: 1000;
        }
        .made-by { font-family: sans-serif; font-size: 12px; opacity: 0.6; margin-bottom: 8px; }
        .social-links { width: 100%; max-width: 550px; border-top: 1px solid var(--border); padding-top: 15px; display: flex; justify-content: center; gap: 30px; }
        .social-links a { color: var(--text); text-decoration: underline; font-family: sans-serif; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .legal-links { font-size: 12px; opacity: 0.5; margin-top: 20px; font-family: sans-serif; text-align: center; }
        .legal-links a { color: inherit; text-decoration: none; }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="header">
            <a href="https://johanness7.github.io/"><img src="logo.png" alt="s7 hub logo"></a>
            <h1>Reaction Test</h1>
        </div>
        
        <div id="game-zone" onclick="handleClick()">
            <div id="msg" class="instruction-text">Klicke, um zu starten</div>
        </div>

        <div class="result-display">
            <div id="result-area" style="display: none;">
                <div class="time-value"><span id="time-ms">0</span> ms</div>
                <div id="rank" class="rank-text">Status: Menschlich 🚶</div>
            </div>
        </div>
    </div>

    </body>
</html>
